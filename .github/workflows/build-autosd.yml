name: AutoSD Build
on:
  workflow_dispatch:
  pull_request_target:
    types: [opened, reopened, synchronize]
  merge_group:
    types: [checks_requested]
jobs:
  autosd-build:
    permissions:
      contents: read
      pull-requests: read
    strategy:
      matrix:
        score_platform:
          - autosd-aarch64
          - autosd-x86_64
        include:
          - score_platform: autosd-aarch64
            arch: aarch64
            runner: ubuntu-24.04-arm
          - score_platform: autosd-x86_64
            arch: x86_64
            runner: ubuntu-24.04
    uses: odra/cicd-workflows/.github/workflows/autosd-build.yml@autosd-bazel-ci
    with:
      runner_label: ${{ matrix.runner }}
      arch: ${{ matrix.arch }}
      bazel-target: '//score/...'
      bazel-disk-cache: ${{ github.workflow }}-${{ github.job }}-${{ matrix.score_platform }}
